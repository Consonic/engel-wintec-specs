<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ENGEL Specs">
<meta name="theme-color" content="#0a0e0d">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>ENGEL &amp; WINTEC — Data &amp; Facts</title>
<style>
:root{
  --engel:#5a9e1b; --engel-bright:#7dc62e; --engel-deep:#3d6b12;
  --ink:#0a0e0d; --panel:#121714; --panel-2:#1a221d; --line:#26302a;
  --text:#eef3ee; --muted:#9fb0a4; --dim:#6f8175;
  --amber:#e8b04b;
  --r:14px; --tap:46px;
  --safe-t:env(safe-area-inset-top,0px); --safe-b:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:var(--ink);color:var(--text)}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,system-ui,sans-serif;
  font-size:17px;line-height:1.45;-webkit-font-smoothing:antialiased;overflow-x:hidden}
button{font-family:inherit;color:inherit;border:0;background:none;cursor:pointer}
input{font-family:inherit}
.mono{font-variant-numeric:tabular-nums;font-feature-settings:"tnum"}

/* ---- header ---- */
header{position:sticky;top:0;z-index:30;background:rgba(10,14,13,.86);
  backdrop-filter:saturate(140%) blur(14px);-webkit-backdrop-filter:saturate(140%) blur(14px);
  border-bottom:1px solid var(--line);padding:calc(var(--safe-t) + 10px) 16px 10px}
.brandrow{display:flex;align-items:center;gap:11px}
.spark{width:30px;height:30px;flex:0 0 auto}
.brandtxt{display:flex;flex-direction:column;line-height:1.05}
.brandtxt b{font-size:18px;font-weight:800;letter-spacing:.14em}
.brandtxt span{font-size:10.5px;color:var(--muted);letter-spacing:.22em;text-transform:uppercase;margin-top:2px}
.search{margin-top:11px;position:relative}
.search input{width:100%;height:var(--tap);border-radius:11px;border:1px solid var(--line);
  background:var(--panel-2);color:var(--text);font-size:16px;padding:0 40px 0 40px}
.search input:focus{outline:2px solid var(--engel);outline-offset:0;border-color:transparent}
.search svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);width:18px;height:18px;fill:var(--dim)}
.search .clr{position:absolute;right:6px;top:50%;transform:translateY(-50%);width:34px;height:34px;
  display:none;align-items:center;justify-content:center;border-radius:8px;color:var(--muted)}
.search.has .clr{display:flex}

/* ---- layout ---- */
main{padding:14px 16px calc(40px + var(--safe-b))}
.crumb{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin:2px 0 14px;font-size:13.5px;color:var(--muted)}
.crumb button{color:var(--engel-bright);font-weight:600;padding:3px 0}
.crumb .sep{color:var(--dim)}
.eyebrow{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--dim);margin:0 0 10px}

/* ---- cards / lists ---- */
.grid{display:flex;flex-direction:column;gap:9px}
.card{display:flex;align-items:center;gap:14px;width:100%;text-align:left;
  background:var(--panel);border:1px solid var(--line);border-radius:var(--r);
  padding:15px 15px;min-height:var(--tap);transition:background .12s,border-color .12s,transform .04s}
.card:active{transform:scale(.992);background:var(--panel-2)}
.card .ic{flex:0 0 auto;width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(150deg,var(--engel-deep),var(--engel));color:#fff;font-weight:800;font-size:15px}
.card .body{flex:1 1 auto;min-width:0}
.card .ttl{font-size:17px;font-weight:650;letter-spacing:-.01em}
.card .sub{font-size:13px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card .chev{flex:0 0 auto;color:var(--dim)}
.count{font-size:12px;color:var(--dim);font-weight:600;background:var(--panel-2);
  border:1px solid var(--line);padding:3px 9px;border-radius:20px;white-space:nowrap}

/* group accent stripes */
.card[data-g="engel-imm"] .ic{background:linear-gradient(150deg,#3d6b12,#7dc62e)}
.card[data-g="engel-elast"] .ic{background:linear-gradient(150deg,#7a4f12,#e8b04b)}
.card[data-g="wintec"] .ic{background:linear-gradient(150deg,#15485e,#2e9fc6)}

/* ---- spec sheet ---- */
.sheet-h{margin:0 0 4px}
.sheet-h .model{font-size:26px;font-weight:800;letter-spacing:-.02em;line-height:1.1}
.sheet-h .fam{font-size:13.5px;color:var(--engel-bright);font-weight:600;margin-top:6px;letter-spacing:.02em}
.bignum{display:flex;gap:10px;margin:16px 0 6px}
.bignum .b{flex:1;background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:13px 14px}
.bignum .b .k{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--dim)}
.bignum .b .v{font-size:23px;font-weight:800;margin-top:3px;letter-spacing:-.01em}
.bignum .b .u{font-size:12px;color:var(--muted);font-weight:600}

.specsec{margin-top:20px}
.specsec h3{font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--engel-bright);
  margin:0 0 8px;padding-bottom:7px;border-bottom:1px solid var(--line);font-weight:700}
.row{display:flex;justify-content:space-between;gap:14px;padding:9px 2px;border-bottom:1px solid rgba(38,48,42,.5)}
.row:last-child{border-bottom:0}
.row .k{font-size:14.5px;color:var(--muted);flex:1 1 auto}
.row .v{font-size:15.5px;font-weight:650;text-align:right;flex:0 0 auto;max-width:58%}
.row .v .un{font-size:11.5px;color:var(--dim);font-weight:500;margin-left:4px}

.note{font-size:13px;color:var(--muted);background:var(--panel);border:1px solid var(--line);
  border-left:3px solid var(--engel);border-radius:9px;padding:11px 13px;margin:14px 0}

/* ---- reference tables ---- */
.tablewrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border:1px solid var(--line);
  border-radius:var(--r);margin:12px 0}
table{border-collapse:collapse;width:100%;font-size:13px}
th,td{padding:9px 11px;text-align:left;white-space:nowrap;border-bottom:1px solid var(--line)}
th{background:var(--panel-2);color:var(--engel-bright);font-weight:700;font-size:11px;
  letter-spacing:.04em;text-transform:uppercase;position:sticky;top:0}
td{color:var(--text)}
tr td:first-child,tr th:first-child{position:sticky;left:0;background:var(--panel);font-weight:650;z-index:1}
th:first-child{background:var(--panel-2);z-index:2}
tbody tr:nth-child(even) td{background:rgba(26,34,29,.45)}
tbody tr:nth-child(even) td:first-child{background:#161d18}

/* ---- search results ---- */
.hint{font-size:13px;color:var(--dim);margin:-4px 0 12px}
.mark{color:var(--engel-bright);font-weight:700}
.empty{text-align:center;color:var(--muted);padding:48px 20px}
.empty svg{width:46px;height:46px;fill:var(--line);margin-bottom:14px}

/* ---- footer ---- */
.foot{margin-top:34px;padding-top:18px;border-top:1px solid var(--line);font-size:11.5px;color:var(--dim);line-height:1.6}
.foot b{color:var(--muted);font-weight:600}

/* ---- home tiles ---- */
.tiles{display:flex;flex-direction:column;gap:11px;margin-bottom:8px}
.tile{position:relative;overflow:hidden;border-radius:18px;border:1px solid var(--line);
  padding:20px 18px;min-height:96px;display:flex;flex-direction:column;justify-content:center;
  background:var(--panel);text-align:left}
.tile:active{transform:scale(.992)}
.tile .glow{position:absolute;inset:0;opacity:.16;pointer-events:none}
.tile h2{margin:0;font-size:21px;font-weight:800;letter-spacing:-.01em;position:relative}
.tile p{margin:5px 0 0;font-size:13.5px;color:var(--muted);position:relative;max-width:88%}
.tile .meta{position:relative;margin-top:11px;font-size:12px;color:var(--dim);font-weight:600;letter-spacing:.04em}
.tile[data-g="engel-imm"] .glow{background:radial-gradient(120% 120% at 90% 10%,#7dc62e,transparent 60%)}
.tile[data-g="engel-elast"] .glow{background:radial-gradient(120% 120% at 90% 10%,#e8b04b,transparent 60%)}
.tile[data-g="wintec"] .glow{background:radial-gradient(120% 120% at 90% 10%,#2e9fc6,transparent 60%)}
.reftile{border-style:dashed}

@media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
@media(min-width:620px){
  body{font-size:18px}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:11px}
  .tiles{display:grid;grid-template-columns:1fr 1fr 1fr}
  main{max-width:1100px;margin:0 auto}
  .bignum .b .v{font-size:26px}
}
.fade{animation:fade .22s ease}
@keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
</style>
</head>

  },
  materials: {
    title:"Plastic discharge factors & screw stroke volumes",
    intro:"Shot weight [g] = stroke volume [cm³] × discharge factor [g/cm³]. Recommended recovery stroke is between 1D and 3D.",
    factors:[
      ["ABS","0,92","240"],["ABS/PC","0,95","260"],["PA 6","0,96","260"],["PA 66","0,96","280"],
      ["PA 66 GF 35","1,15","280"],["PBT","1,07","260"],["PBT GF 30","1,36","260"],["PC","1,04","300"],
      ["PC GF 30","1,30","300"],["PC/PBT","1,04","265"],["PE-HD","0,72","220"],["PE-LD","0,70","220"],
      ["PET","1,10","260"],["PMMA","1,04","240"],["POM","1,15","220"],["PP","0,73","220"],
      ["PP T 20","0,87","230"],["PS","0,92","220"],["PVC","1,12","200"],["SAN","0,96","240"],
      ["TPE-S","0,98","210"],["TPE-U","0,99","200"],["TPE-V","0,72","210"],
    ],
    // screw Ø (mm) -> stroke volume cm³ at 0.5D,1D,1.5D,2D,2.5D,3D,3.5D
    strokeCols:["Ø mm","0,5D","1D","1,5D","2D","2,5D","3D","3,5D"],
    strokeRows:[
      ["15","1,3","2,7","4,0","5,3","6,6","8,0","9,3"],["18","2,3","4,6","6,9","9,2","11","14","16"],
      ["20","3,1","6,3","9,4","13","16","19","22"],["22","4,2","8,4","13","17","21","25","29"],
      ["25","6,1","12","18","25","31","37","43"],["30","11","21","32","42","53","64","74"],
      ["35","17","34","51","67","84","101","118"],["40","25","50","75","101","126","151","176"],
      ["45","36","72","107","143","179","215","250"],["50","49","98","147","196","245","295","344"],
      ["55","65","131","196","261","327","392","457"],["60","85","170","254","339","424","509","594"],
      ["70","135","269","404","539","673","808","943"],["80","201","402","603","804","1005","1206","1407"],
      ["90","286","573","859","1145","1431","1718","2004"],["105","455","909","1364","1818","2273","2728","3182"],
      ["120","679","1357","2036","2714","3393","4072","4750"],["135","966","1932","2899","3865","4831","5797","6763"],
      ["150","1325","2651","3976","5301","6627","7952","9278"],["160","1608","3217","4825","6434","8042","9651","11259"],
      ["170","1929","3859","5788","7717","9647","11576","13505"],["180","2290","4580","6871","9161","11451","13741","16032"],
      ["190","2694","5387","8081","10774","13468","16161","18855"],["200","3142","6283","9425","12566","15708","18850","21991"],
      ["215","3903","7806","11708","15611","19514","23417","27320"],["230","4778","9556","14334","19112","23890","28668","33446"],
      ["245","5775","11550","17325","23100","28875","34650","40426"],["260","6902","13804","20706","27608","34510","41412","48315"],
    ]
  }
};

DATA.groups.push(ELAST_GROUP, WINTEC_GROUP);
DATA.fieldsElast = FIELDS_ELAST;
DATA.fieldsWintec = FIELDS_WINTEC;
DATA.reference = REFERENCE;
DATA.meta = { source:"ENGEL & WINTEC Data & Facts, de-en 2026 | 04", note:"Subject to technical changes and printing/transmission errors. Values transcribed from the catalogue." };

</script>
<script>
"use strict";
const app=document.getElementById('app');
const qEl=document.getElementById('q');
const clrEl=document.getElementById('clr');
const wrap=document.getElementById('searchWrap');

const groupShort={'engel-imm':'IMM','engel-elast':'elast','wintec':'WINTEC'};
function fieldsFor(group){
  if(group.fieldSet==='elast') return DATA.fieldsElast;
  if(group.fieldSet==='wintec') return DATA.fieldsWintec;
  return DATA.fields;
}
// group fields into readable sections by key
const SECTIONS=[
  {h:'Injection unit',keys:['screwDia','screwStroke','injCap','injVol','injPress','plungerDia','maxInjCap','screwLen','screwSpeed','maxScrewSpeed','ldZone','recovZone','ldBarrier','recovBarrier','recovery','injRate','injPressReg','injPressMax','stripDim','nozzle','heating','heatZones','heatPlatenCap']},
  {h:'Clamping unit',keys:['clampForce','openStroke','closeStroke','maxSpeed','openForce','mouldHeight','minMould','daylight','platenDist','dropDaylight','platenStd','platenWide','heatPlatenStd','heatPlatenEnl','heatPlatenMax','rotaryTable','tieBar','chute','moldWeight','coolCircuits','ejector','sideEjector','centerEjector','dryCycle']},
  {h:'Drive & dimensions',keys:['drivePower','oil','machHeight','machWeight','weight','dims','machDims']},
  {h:'Automation',keys:['robot','picker']},
];
const BIG={'engel-imm':['clampForce','injCap'],'engel-elast':['clampForce','injVol'],'wintec':['clampForce','injCap']};

let state={view:'home'};
function go(s){state=s;render();window.scrollTo(0,0);}

// ---------- renderers ----------
function home(){
  let h='<p class="eyebrow fade">Injection moulding spec catalogue</p><div class="tiles fade">';
  DATA.groups.forEach(g=>{
    const n=g.families.reduce((a,f)=>a+f.machines.length,0);
    h+=`<button class="tile" data-g="${g.id}" onclick="go({view:'group',g:'${g.id}'})">
      <div class="glow"></div><h2>${g.name}</h2><p>${g.blurb}</p>
      <div class="meta">${g.families.length} families · ${n} machines</div></button>`;
  });
  h+=`<button class="tile reftile" onclick="go({view:'ref'})">
    <h2>Reference</h2><p>Robots, sprue pickers, plastic discharge factors &amp; screw stroke volumes.</p>
    <div class="meta">Conversion tables</div></button>`;
  h+='</div>';
  h+=footer();
  app.innerHTML=h;
}

function group(id){
  const g=DATA.groups.find(x=>x.id===id);
  let h=crumb([['Home',"go({view:'home'})"]],g.name);
  h+=`<p class="eyebrow fade">${g.name}</p>`;
  if(g.blurb) h+=`<div class="note fade">${g.blurb}</div>`;
  h+='<div class="grid fade">';
  g.families.forEach(f=>{
    h+=`<button class="card" data-g="${g.id}" onclick="go({view:'family',g:'${g.id}',f:'${f.id}'})">
      <span class="ic">${initials(f.name)}</span>
      <span class="body"><span class="ttl">${f.name}</span><span class="sub">${f.range||''}</span></span>
      <span class="count">${f.machines.length}</span></button>`;
  });
  h+='</div>'+footer();
  app.innerHTML=h;
}

function family(gid,fid){
  const g=DATA.groups.find(x=>x.id===gid);
  const f=g.families.find(x=>x.id===fid);
  let h=crumb([['Home',"go({view:'home'})"],[g.name,`go({view:'group',g:'${g.id}'})`]],f.name);
  h+=`<p class="eyebrow fade">${f.name} · ${f.range||''}</p>`;
  if(f.note) h+=`<div class="note fade">${f.note}</div>`;
  h+='<div class="grid fade">';
  f.machines.forEach((m,i)=>{
    h+=`<button class="card" data-g="${g.id}" onclick="go({view:'machine',g:'${g.id}',f:'${f.id}',m:${i}})">
      <span class="ic">${groupShort[g.id]==='IMM'?'':''}${clampOf(m)||'–'}</span>
      <span class="body"><span class="ttl">${m.model}</span><span class="sub">${m.size||''}</span></span>
      <span class="chev">›</span></button>`;
  });
  h+='</div>'+footer();
  app.innerHTML=h;
}

function clampOf(m){const c=m.specs.clampForce;if(!c)return'';return String(c).split('/')[0].split(' ')[0];}

function machine(gid,fid,mi){
  const g=DATA.groups.find(x=>x.id===gid);
  const f=g.families.find(x=>x.id===fid);
  const m=f.machines[mi];
  const fields=fieldsFor(g);
  const fmap={};fields.forEach(fl=>fmap[fl[0]]=fl);
  let h=crumb([['Home',"go({view:'home'})"],[g.name,`go({view:'group',g:'${g.id}'})`],[f.name,`go({view:'family',g:'${g.id}',f:'${f.id}'})`]],m.model);
  h+=`<div class="sheet-h fade"><div class="model">${m.model}</div>
     <div class="fam">${g.name} · ${f.name}${m.size?' · '+m.size:''}</div></div>`;
  // big numbers
  const bigs=BIG[g.id]||['clampForce','injCap'];
  let bn='';
  bigs.forEach(k=>{
    if(m.specs[k]&&fmap[k]){const fl=fmap[k];
      bn+=`<div class="b"><div class="k">${fl[1].replace('Clamping force','Clamp force').replace('Max. injection capacity','Shot capacity').replace('Injection volume','Shot volume')}</div>
        <div class="v mono">${m.specs[k]} <span class="u">${fl[2]||''}</span></div></div>`;}
  });
  if(bn) h+=`<div class="bignum fade">${bn}</div>`;
  // sections
  SECTIONS.forEach(sec=>{
    let rows='';
    sec.keys.forEach(k=>{
      if(bigs.includes(k))return; // already shown big
      if(m.specs[k]!=null&&fmap[k]){const fl=fmap[k];
        rows+=`<div class="row"><div class="k">${fl[1]}</div>
          <div class="v mono">${m.specs[k]}${fl[2]?`<span class="un">${fl[2]}</span>`:''}</div></div>`;}
    });
    if(rows) h+=`<div class="specsec fade"><h3>${sec.h}</h3>${rows}</div>`;
  });
  h+=footer(true);
  app.innerHTML=h;
}

// ---------- reference ----------
function refView(){
  const R=DATA.reference;
  let h=crumb([['Home',"go({view:'home'})"]],'Reference');
  h+='<p class="eyebrow fade">Reference &amp; conversion</p>';
  [R.linearRobots,R.spruePicker,R.articulated].forEach(t=>{h+=refTable(t);});
  // materials
  const M=R.materials;
  h+=`<div class="specsec fade"><h3>${M.title}</h3><div class="note">${M.intro}</div>`;
  h+='<p class="hint">Discharge factor — multiply by stroke volume for shot weight.</p>';
  h+='<div class="tablewrap"><table><thead><tr><th>Material</th><th>Factor g/cm³</th><th>Melt °C</th></tr></thead><tbody>';
  M.factors.forEach(r=>{h+=`<tr><td>${r[0]}</td><td class="mono">${r[1]}</td><td class="mono">${r[2]}</td></tr>`;});
  h+='</tbody></table></div>';
  h+='<p class="hint">Screw stroke volume [cm³] by diameter and stroke (×D).</p>';
  h+='<div class="tablewrap"><table><thead><tr>'+M.strokeCols.map(c=>`<th>${c}</th>`).join('')+'</tr></thead><tbody>';
  M.strokeRows.forEach(r=>{h+='<tr>'+r.map((c,i)=>`<td class="mono">${c}</td>`).join('')+'</tr>';});
  h+='</tbody></table></div></div>';
  h+=footer();
  app.innerHTML=h;
}
function refTable(t){
  let h=`<div class="specsec fade"><h3>${t.title}</h3><div class="tablewrap"><table><thead><tr>`;
  h+=t.cols.map(c=>`<th>${c}</th>`).join('')+'</tr></thead><tbody>';
  t.rows.forEach(r=>{h+='<tr>'+r.map(c=>`<td class="mono">${c||'–'}</td>`).join('')+'</tr>';});
  h+='</tbody></table></div>';
  if(t.notes) h+=`<p class="hint">${t.notes}</p>`;
  h+='</div>';
  return h;
}

// ---------- search ----------
let allMachines=[];
DATA.groups.forEach(g=>g.families.forEach(f=>f.machines.forEach((m,i)=>{
  allMachines.push({g,f,m,i,hay:(m.model+' '+(m.size||'')+' '+f.name+' '+g.name).toLowerCase()});
})));

function search(term){
  const t=term.trim().toLowerCase();
  const toks=t.split(/\s+/).filter(Boolean);
  let res=allMachines.filter(x=>toks.every(tk=>x.hay.includes(tk)));
  let h=`<p class="eyebrow">Search</p>`;
  if(!res.length){
    h+=`<div class="empty"><svg viewBox="0 0 24 24"><path d="M10 2a8 8 0 105.3 14l5.4 5.4 1.4-1.4-5.4-5.4A8 8 0 0010 2zm0 2a6 6 0 110 12 6 6 0 010-12z"/></svg>
      <div>No machines match "<b>${esc(term)}</b>".</div>
      <p class="hint" style="margin-top:8px">Try a clamp force (1300), a family (e-mac, duo) or a size (210/80).</p></div>`;
    app.innerHTML=h;return;
  }
  h+=`<p class="hint">${res.length} machine${res.length>1?'s':''} found</p><div class="grid">`;
  res.slice(0,80).forEach(x=>{
    h+=`<button class="card" data-g="${x.g.id}" onclick="go({view:'machine',g:'${x.g.id}',f:'${x.f.id}',m:${x.i}})">
      <span class="ic">${clampOf(x.m)||'–'}</span>
      <span class="body"><span class="ttl">${hl(x.m.model,toks)}</span>
      <span class="sub">${groupShort[x.g.id]} · ${x.f.name}${x.m.size?' · '+x.m.size:''}</span></span>
      <span class="chev">›</span></button>`;
  });
  h+='</div>';
  if(res.length>80) h+=`<p class="hint" style="margin-top:12px">Showing first 80 — keep typing to narrow.</p>`;
  app.innerHTML=h;
}
function hl(s,toks){let out=esc(s);toks.forEach(tk=>{if(!tk)return;
  out=out.replace(new RegExp('('+tk.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','ig'),'<span class="mark">$1</span>');});return out;}

// ---------- helpers ----------
function crumb(items,cur){
  let h='<div class="crumb">';
  items.forEach(it=>{h+=`<button onclick="${it[1]}">${it[0]}</button><span class="sep">›</span>`;});
  h+=`<span>${cur}</span></div>`;return h;
}
function initials(name){
  const n=name.replace(/[^a-z0-9 ]/gi,'').trim().split(' ')[0];
  return n.slice(0,2).toLowerCase();
}
function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function footer(short){
  return `<div class="foot"><b>${DATA.meta.source}</b><br>${DATA.meta.note}
   ${short?'<br>Slashes (a/b/c) list values per injection-unit option.':''}</div>`;
}

function render(){
  if(qEl.value.trim()){search(qEl.value);return;}
  switch(state.view){
    case 'home':home();break;
    case 'group':group(state.g);break;
    case 'family':family(state.g,state.f);break;
    case 'machine':machine(state.g,state.f,state.m);break;
    case 'ref':refView();break;
    default:home();
  }
}

// search wiring
let tmr;
qEl.addEventListener('input',()=>{
  wrap.classList.toggle('has',!!qEl.value);
  clearTimeout(tmr);tmr=setTimeout(render,90);
});
clrEl.addEventListener('click',()=>{qEl.value='';wrap.classList.remove('has');qEl.focus();render();});

window.go=go;
render();
</script>
</body>
</html>
